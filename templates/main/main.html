{% extends 'base.html' %}
{% load static %}

{% block content %}

<div id="heroCarousel" class="carousel slide" data-bs-ride="carousel">
    <div class="carousel-inner">
        <div class="carousel-item active">
            <img src="https://dummyimage.com/1200x400/adb5bd/495057.jpg&text=Carousel+Image+1" class="d-block w-100 hero-img" alt="Hero 1">
            <div class="carousel-caption">
                <h1 class="text-white fw-bold">Daily Recommendation</h1>
            </div>
        </div>
        <div class="carousel-item">
            <img src="https://dummyimage.com/1200x400/adb5bd/495057.jpg&text=Carousel+Image+2" class="d-block w-100 hero-img" alt="Hero 2">
            <div class="carousel-caption">
                <h1 class="text-white fw-bold">Fresh Ingredients</h1>
            </div>
        </div>
    </div>
    
    <button class="carousel-control-prev" type="button" data-bs-target="#heroCarousel" data-bs-slide="prev">
        <span class="carousel-control-prev-icon"></span>
    </button>
    <button class="carousel-control-next" type="button" data-bs-target="#heroCarousel" data-bs-slide="next">
        <span class="carousel-control-next-icon"></span>
    </button>
</div>

<div class="container weekly-section mt-5 mb-5">
    <h2 class="section-title mb-4">This Week's Recommended Restaurant</h2>
    
    <div class="row">
        {% for r in restaurants %}
        <div class="col-md-4">
            <div class="custom-card">
                <div class="rank-badge">{{ r.rank }}</div>
                <img src="{{ r.image }}" alt="{{ r.name }}" class="card-image w-100">
                <div class="card-content mt-3">
                    <h4>{{ r.name }}</h4>
                    <p>{{ r.description }}</p>
                </div>
            </div>
        </div>
        {% endfor %}
    </div>
</div>

{% endblock %}
